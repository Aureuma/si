name: fort-vault-ci

on:
  push:
    paths:
      - "rust/crates/si-fort/**"
      - "rust/crates/si-vault/**"
      - "rust/crates/si-runtime/**"
      - "rust/crates/si-config/**"
      - "rust/crates/si-cli/**"
      - "rust/crates/si-tools/**"
      - "tools/si-image/**"
      - ".github/workflows/fort-vault-ci.yml"
  pull_request:
    paths:
      - "rust/crates/si-fort/**"
      - "rust/crates/si-vault/**"
      - "rust/crates/si-runtime/**"
      - "rust/crates/si-config/**"
      - "rust/crates/si-cli/**"
      - "rust/crates/si-tools/**"
      - "tools/si-image/**"
      - ".github/workflows/fort-vault-ci.yml"

jobs:
  fort-vault:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout SI
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.86.0

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> .artifacts/cargo-target

      - name: Unit tests (Fort/Vault surface)
        run: |
          cargo test -p si-rs-fort -p si-rs-vault

      - name: Build SI local image for spawn integration
        run: docker build -t aureuma/si:local -f tools/si-image/Dockerfile .

      - name: SI Fort spawn matrix integration
        run: cargo run --quiet --locked --manifest-path rust/crates/si-tools/Cargo.toml --bin test-fort-spawn-matrix --
