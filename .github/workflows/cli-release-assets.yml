name: CLI Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or validation version to build (for example v0.48.0)
        required: true
        type: string
      publish:
        description: Upload release assets and publish external packages
        required: true
        default: false
        type: boolean

concurrency:
  group: cli-release-assets-${{ github.event.release.tag_name || github.event.inputs.tag || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      publish: ${{ steps.resolve.outputs.publish }}
    steps:
      - name: Resolve release inputs
        id: resolve
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          checkout_ref="${{ github.event.release.tag_name }}"
          publish="true"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ github.event.inputs.tag }}"
            checkout_ref="${GITHUB_SHA}"
            publish="${{ github.event.inputs.publish }}"
          fi
          if [[ -z "${tag}" ]]; then
            echo "No release tag provided." >&2
            exit 1
          fi
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "checkout_ref=${checkout_ref}" >> "${GITHUB_OUTPUT}"
          echo "publish=${publish}" >> "${GITHUB_OUTPUT}"
          echo "Preparing release assets for tag ${tag} from ${checkout_ref} (publish=${publish})"

  build-release-asset:
    name: Build ${{ matrix.target }}
    needs: [resolve-tag]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - target: linux-arm64
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
          - target: darwin-amd64
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
          - target: darwin-arm64
            runner: macos-latest
            rust_target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0
        with:
          targets: ${{ matrix.rust_target }}

      - name: Validate release tag and CLI version
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          cargo run --quiet --locked --release -p si-rs-cli -- build self validate --tag "${tag}"

      - name: Build release archive
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          cargo run --quiet --locked --release -p si-rs-cli -- build self asset \
            --version "${tag}" \
            --target "${{ matrix.target }}" \
            --out-dir dist
          ls -lah dist

      - name: Upload target archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: si-release-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish-assets:
    name: Verify and publish release assets
    needs: [resolve-tag, build-release-asset]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Download target archives
        uses: actions/download-artifact@v4
        with:
          pattern: si-release-*
          path: dist
          merge-multiple: true

      - name: Write checksums
        shell: bash
        run: |
          set -euo pipefail
          (cd dist && sha256sum si_*.tar.gz > checksums.txt)
          cat dist/checksums.txt
          ls -lah dist

      - name: Verify release archives
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          cargo run --quiet --locked --release -p si-rs-cli -- build self verify --version "${tag}" --out-dir dist

      - name: Upload combined release dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: si-release-dist
          path: |
            dist/*.tar.gz
            dist/checksums.txt
          if-no-files-found: error

      - name: Upload assets to GitHub Release
        if: needs.resolve-tag.outputs.publish == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          gh release view "${tag}" --repo "${{ github.repository }}" >/dev/null
          gh release upload "${tag}" dist/*.tar.gz dist/checksums.txt --repo "${{ github.repository }}" --clobber

      - name: Attest release artifacts
        if: needs.resolve-tag.outputs.publish == 'true'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.tar.gz
            dist/checksums.txt

  publish-npm:
    name: Publish npm package (@aureuma/si)
    needs: [resolve-tag, publish-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Check npm publish secret
        id: gate
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.resolve-tag.outputs.publish }}" != "true" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Validation-only run; skipping npm publish."
          elif [[ -z "${NPM_TOKEN}" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "NPM_TOKEN is not configured; skipping npm publish."
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Setup Node
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Setup Rust
        if: steps.gate.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Publish @aureuma/si
        if: steps.gate.outputs.enabled == 'true'
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          cargo run --quiet --locked --release -p si-rs-cli -- build npm publish --version "${tag}"

  verify-homebrew-local-install:
    name: Verify local Homebrew install path
    needs: [resolve-tag, publish-assets]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Download verified release dist
        uses: actions/download-artifact@v4
        with:
          name: si-release-dist
          path: dist

      - name: Run Homebrew installer smoke
        shell: bash
        env:
          HOMEBREW_NO_AUTO_UPDATE: "1"
          HOMEBREW_NO_INSTALL_CLEANUP: "1"
          HOMEBREW_NO_ENV_HINTS: "1"
          SI_INSTALL_SMOKE_ASSETS_DIR: dist
        run: |
          set -euo pipefail
          cargo run --quiet --locked -p si-rs-cli -- build installer smoke-homebrew

  update-homebrew-tap:
    name: Update homebrew-si tap formula
    needs: [resolve-tag, publish-assets]
    runs-on: ubuntu-latest
    steps:
      - name: Check Homebrew tap token
        id: gate
        shell: bash
        env:
          HOMEBREW_TAP_PUSH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          GH_PAT_AUREUMA: ${{ secrets.GH_PAT_AUREUMA }}
        run: |
          set -euo pipefail
          if [[ "${{ needs.resolve-tag.outputs.publish }}" != "true" ]]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Validation-only run; skipping Homebrew tap update."
          elif [[ -n "${HOMEBREW_TAP_PUSH_TOKEN}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "token_source=HOMEBREW_TAP_PUSH_TOKEN" >> "${GITHUB_OUTPUT}"
          elif [[ -n "${GH_PAT_AUREUMA}" ]]; then
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
            echo "token_source=GH_PAT_AUREUMA" >> "${GITHUB_OUTPUT}"
            echo "HOMEBREW_TAP_PUSH_TOKEN is not configured; falling back to GH_PAT_AUREUMA for Aureuma/homebrew-si."
          else
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            echo "Neither HOMEBREW_TAP_PUSH_TOKEN nor GH_PAT_AUREUMA is configured; skipping tap update."
          fi

      - name: Checkout
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-tag.outputs.checkout_ref }}

      - name: Setup Rust
        if: steps.gate.outputs.enabled == 'true'
        uses: dtolnay/rust-toolchain@1.94.0

      - name: Download verified release dist
        if: steps.gate.outputs.enabled == 'true'
        uses: actions/download-artifact@v4
        with:
          name: si-release-dist
          path: dist

      - name: Render and push tap formula update
        if: steps.gate.outputs.enabled == 'true'
        env:
          HOMEBREW_TAP_PUSH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          GH_PAT_AUREUMA: ${{ secrets.GH_PAT_AUREUMA }}
        run: |
          set -euo pipefail
          tag="${{ needs.resolve-tag.outputs.tag }}"
          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          primary_token="${HOMEBREW_TAP_PUSH_TOKEN}"
          fallback_token="${GH_PAT_AUREUMA}"
          if [[ -z "${primary_token}" && -z "${fallback_token}" ]]; then
            echo "tap push token resolved empty" >&2
            exit 1
          fi

          tap_dir="${tmp_dir}/homebrew-si"
          clone_with_token() {
            local token="$1"
            [[ -n "${token}" ]] || return 1
            rm -rf "${tap_dir}"
            git clone "https://x-access-token:${token}@github.com/Aureuma/homebrew-si.git" "${tap_dir}"
            git -C "${tap_dir}" remote set-url origin "https://x-access-token:${token}@github.com/Aureuma/homebrew-si.git"
          }

          run_tap_update() {
            local token="$1"
            clone_with_token "${token}"
            git -C "${tap_dir}" config user.email "github-actions[bot]@users.noreply.github.com"
            git -C "${tap_dir}" config user.name "github-actions[bot]"
            cargo run --quiet --locked --release -p si-rs-cli -- build homebrew update \
              --version "${tag}" \
              --checksums dist/checksums.txt \
              --tap-dir "${tap_dir}" \
              --repo "${{ github.repository }}" \
              --commit \
              --push
          }

          if [[ -n "${primary_token}" ]]; then
            if run_tap_update "${primary_token}"; then
              exit 0
            fi
            if [[ -n "${fallback_token}" && "${fallback_token}" != "${primary_token}" ]]; then
              echo "Primary Homebrew token update failed; retrying with GH_PAT_AUREUMA fallback."
              run_tap_update "${fallback_token}"
              exit 0
            fi
            echo "Primary Homebrew token update failed and no distinct fallback token is available." >&2
            exit 1
          fi

          run_tap_update "${fallback_token}"

  verify-release-distribution:
    name: Verify release assets, npm package, and Homebrew tap
    needs: [resolve-tag, publish-assets, publish-npm, verify-homebrew-local-install, update-homebrew-tap]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release distribution state
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          HOMEBREW_TAP_PUSH_TOKEN: ${{ secrets.HOMEBREW_TAP_PUSH_TOKEN }}
          GH_PAT_AUREUMA: ${{ secrets.GH_PAT_AUREUMA }}
        run: |
          set -euo pipefail

          if [[ "${{ needs.resolve-tag.outputs.publish }}" != "true" ]]; then
            echo "Validation-only run; skipping published release, npm, and Homebrew tap verification."
            exit 0
          fi

          tag="${{ needs.resolve-tag.outputs.tag }}"
          version="${tag#v}"
          if [[ -z "${version}" || "${version}" == "${tag}" ]]; then
            echo "invalid tag: ${tag}" >&2
            exit 1
          fi

          retry() {
            local attempts="$1"
            local delay="$2"
            shift 2
            local i
            for ((i=1; i<=attempts; i++)); do
              if "$@"; then
                return 0
              fi
              if (( i < attempts )); then
                sleep "${delay}"
              fi
            done
            return 1
          }

          assets="$(gh release view "${tag}" --repo "${{ github.repository }}" --json assets --jq '.assets[].name')"
          required_assets=(
            "si_${version}_linux_amd64.tar.gz"
            "si_${version}_linux_arm64.tar.gz"
            "si_${version}_darwin_amd64.tar.gz"
            "si_${version}_darwin_arm64.tar.gz"
            "checksums.txt"
          )
          for asset in "${required_assets[@]}"; do
            if ! grep -Fxq "${asset}" <<<"${assets}"; then
              echo "missing release asset: ${asset}" >&2
              exit 1
            fi
          done
          echo "release assets verified for ${tag}"

          if [[ -n "${NPM_TOKEN}" ]]; then
            if ! retry 12 10 npm view "@aureuma/si@${version}" version >/dev/null 2>&1; then
              echo "npm package @aureuma/si@${version} was not visible after retries" >&2
              exit 1
            fi
            npm_version="$(npm view "@aureuma/si@${version}" version)"
            if [[ "${npm_version}" != "${version}" ]]; then
              echo "npm version mismatch: expected ${version}, got ${npm_version}" >&2
              exit 1
            fi
            echo "npm package verified: @aureuma/si@${npm_version}"
            npm_prefix="${RUNNER_TEMP}/si-npm-verify"
            rm -rf "${npm_prefix}"
            mkdir -p "${npm_prefix}"
            npm install --silent --global --prefix "${npm_prefix}" "@aureuma/si@${version}"
            SI_NPM_RELEASE_BASE_URL="https://github.com/${{ github.repository }}/releases/download/${tag}" \
              "${npm_prefix}/bin/si" version >/dev/null
            echo "npm install verification passed for @aureuma/si@${version}"
          else
            echo "NPM_TOKEN is not configured; skipping npm verification."
          fi

          if [[ -n "${HOMEBREW_TAP_PUSH_TOKEN}" || -n "${GH_PAT_AUREUMA}" ]]; then
            tap_url="https://raw.githubusercontent.com/Aureuma/homebrew-si/main/Formula/si.rb"
            if ! retry 12 10 bash -lc "curl --proto '=https' --tlsv1.2 -fsSL '${tap_url}' | grep -Eq 'version\\s+\"${version}\"'"; then
              echo "Homebrew tap formula did not update to ${version} after retries" >&2
              exit 1
            fi
            echo "homebrew tap formula verified at version ${version}"
          else
            echo "Neither HOMEBREW_TAP_PUSH_TOKEN nor GH_PAT_AUREUMA is configured; skipping tap verification."
          fi
