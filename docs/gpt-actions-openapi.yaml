components:
  schemas:
    NucleusStatusView:
      additionalProperties: false
      description: Current Nucleus status projection and durable object counts.
      properties:
        bind_addr:
          description: TCP address where Nucleus listens.
          example: 0.0.0.0:4747
          readOnly: true
          type: string
        next_event_seq:
          description: Next canonical event sequence number that will be written.
          example: 128
          minimum: 0
          readOnly: true
          type: integer
        run_count:
          description: Number of durable run records.
          example: 8
          minimum: 0
          readOnly: true
          type: integer
        session_count:
          description: Number of durable session records.
          example: 2
          minimum: 0
          readOnly: true
          type: integer
        state_dir:
          description: Filesystem directory that stores durable Nucleus state.
          example: /home/si/.local/state/si/nucleus
          readOnly: true
          type: string
        task_count:
          description: Number of durable task records.
          example: 12
          minimum: 0
          readOnly: true
          type: integer
        version:
          description: Running SI Nucleus package version.
          example: 0.59.13
          readOnly: true
          type: string
        worker_count:
          description: Number of durable worker records.
          example: 2
          minimum: 0
          readOnly: true
          type: integer
        ws_url:
          description: Websocket URL exposed by the same Nucleus service.
          example: ws://0.0.0.0:4747/ws
          readOnly: true
          type: string
      required:
      - version
      - bind_addr
      - ws_url
      - state_dir
      - task_count
      - worker_count
      - session_count
      - run_count
      - next_event_seq
      type: object
    OpenApiDocumentView:
      additionalProperties: true
      description: Public OpenAPI document returned by this endpoint.
      properties:
        components:
          additionalProperties: true
          description: OpenAPI reusable components.
          properties: {}
          type: object
        info:
          additionalProperties: true
          description: API metadata.
          properties:
            description:
              description: API description.
              type: string
            title:
              description: API title.
              example: SI Nucleus REST API
              type: string
            version:
              description: API package version.
              example: 0.59.13
              type: string
          required:
          - title
          - version
          type: object
        openapi:
          description: OpenAPI specification version.
          example: 3.1.0
          type: string
        paths:
          additionalProperties: true
          description: OpenAPI path item map.
          properties: {}
          type: object
        security:
          description: Default security requirements.
          items:
            additionalProperties: true
            properties: {}
            type: object
          type: array
        servers:
          description: Absolute server URLs clients can call.
          items:
            additionalProperties: true
            properties:
              url:
                description: Absolute API base URL.
                example: https://nucleus.aureuma.ai
                format: uri
                type: string
            required:
            - url
            type: object
          type: array
      required:
      - openapi
      - info
      - servers
      - paths
      type: object
    RestErrorEnvelope:
      additionalProperties: false
      description: Standard REST error envelope returned when a Nucleus request fails.
      properties:
        error:
          additionalProperties: false
          description: Machine-readable error details.
          properties:
            code:
              description: Stable Nucleus error code.
              example: not_found
              type: string
            details:
              description: Optional structured details for debugging the request.
            message:
              description: Human-readable error summary.
              example: task not found
              type: string
          required:
          - code
          - message
          type: object
      required:
      - error
      type: object
    RunRecord:
      additionalProperties: false
      description: Durable execution attempt for a task.
      properties:
        app_server_turn_id:
          description: Underlying app server turn id associated with this run.
          example: null
          readOnly: true
          type:
          - string
          - 'null'
        ended_at:
          description: Timestamp when execution reached a terminal state.
          example: null
          format: date-time
          readOnly: true
          type:
          - string
          - 'null'
        parent_run_id:
          description: Parent run id for nested execution, if any.
          example: null
          pattern: ^si-run-.+
          readOnly: true
          type:
          - string
          - 'null'
        run_id:
          description: Canonical SI run id.
          example: si-run-0123456789abcdef00000001
          pattern: ^si-run-.+
          readOnly: true
          type: string
        session_id:
          description: Session used by this run.
          example: si-session-0123456789abcdef00000001
          pattern: ^si-session-.+
          readOnly: true
          type: string
        started_at:
          description: Timestamp when execution started.
          example: 2026-04-17T00:00:05Z
          format: date-time
          readOnly: true
          type:
          - string
          - 'null'
        status:
          description: Current run lifecycle status.
          enum:
          - queued
          - running
          - blocked
          - completed
          - failed
          - cancelled
          example: running
          readOnly: true
          type: string
        task_id:
          description: Task executed by this run.
          example: si-task-0123456789abcdef00000001
          pattern: ^si-task-.+
          readOnly: true
          type: string
      required:
      - run_id
      - task_id
      - session_id
      - status
      type: object
    SessionRecord:
      additionalProperties: false
      description: Durable worker session projection tracked by Nucleus.
      properties:
        app_server_thread_id:
          description: Underlying app server thread id for continuity.
          example: thread_0123456789abcdef
          readOnly: true
          type:
          - string
          - 'null'
        created_at:
          description: Session creation timestamp.
          example: 2026-04-17T00:00:00Z
          format: date-time
          readOnly: true
          type: string
        lifecycle_state:
          description: Current session lifecycle state.
          enum:
          - opening
          - ready
          - busy
          - broken
          - closed
          example: ready
          readOnly: true
          type: string
        profile:
          description: SI profile associated with the session.
          example: darmstada
          pattern: ^[a-z][a-z0-9-]*$
          type:
          - string
          - 'null'
        session_id:
          description: Canonical SI session id.
          example: si-session-0123456789abcdef00000001
          pattern: ^si-session-.+
          readOnly: true
          type: string
        summary_state:
          description: Short durable summary of reusable session context.
          example: idle
          type:
          - string
          - 'null'
        updated_at:
          description: Last session update timestamp.
          example: 2026-04-17T00:00:00Z
          format: date-time
          readOnly: true
          type: string
        workdir:
          description: Workspace directory associated with the session.
          example: /home/si/Development/si
          type:
          - string
          - 'null'
        worker_id:
          description: Worker currently associated with the session.
          example: si-worker-0123456789abcdef00000001
          pattern: ^si-worker-.+
          readOnly: true
          type: string
      required:
      - session_id
      - worker_id
      - lifecycle_state
      - created_at
      - updated_at
      type: object
    TaskCancelResultView:
      additionalProperties: false
      description: Result returned after requesting cancellation for a task.
      properties:
        cancellation_requested:
          description: True when Nucleus sent a live runtime interrupt for an active run; false when cancellation completed without a runtime interrupt or the task was already terminal.
          example: true
          readOnly: true
          type: boolean
        run:
          anyOf:
          - $ref: '#/components/schemas/RunRecord'
          - type: 'null'
          description: Run affected by the cancellation request, when the task had an active or latest run.
        task:
          allOf:
          - $ref: '#/components/schemas/TaskRecord'
          description: Task projection after the cancellation request was handled.
      required:
      - task
      - cancellation_requested
      type: object
    TaskCreateParams:
      additionalProperties: false
      description: Request body for creating durable Nucleus work.
      properties:
        instructions:
          description: Complete task instructions for the assigned worker.
          example: Inspect queued and running tasks and report any items that are stuck.
          minLength: 1
          type: string
        max_retries:
          default: null
          description: Optional maximum retry attempts after failed execution.
          example: 0
          minimum: 0
          type:
          - integer
          - 'null'
        profile:
          default: null
          description: 'Preferred SI worker profile. If omitted or temporarily unavailable, Nucleus assigns the first available profile by priority: requested profile, ready workers, configured profiles, reusable sessions, then non-ready workers.'
          example: darmstada
          pattern: ^[a-z][a-z0-9-]*$
          type:
          - string
          - 'null'
        session_id:
          default: null
          description: Optional existing SI session id to reuse for continuity.
          example: si-session-0123456789abcdef00000001
          pattern: ^si-session-.+
          type:
          - string
          - 'null'
        source:
          default: websocket
          description: Source category for the task intake request. External GPT Actions should normally use websocket.
          enum:
          - cli
          - websocket
          - cron
          - hook
          - system
          example: websocket
          type: string
        timeout_seconds:
          default: null
          description: Optional execution timeout in seconds for this task.
          example: 900
          minimum: 0
          type:
          - integer
          - 'null'
        title:
          description: Short operator-facing summary of the work to perform.
          example: Audit Nucleus tasks
          minLength: 1
          type: string
      required:
      - title
      - instructions
      type: object
    TaskRecord:
      additionalProperties: false
      description: Durable task projection stored by Nucleus.
      properties:
        blocked_reason:
          description: Reason the task is blocked when status is blocked.
          enum:
          - null
          - auth_required
          - worker_unavailable
          - profile_unavailable
          - session_broken
          - producer_error
          - operator_hold
          - fort_unavailable
          example: null
          type:
          - string
          - 'null'
        checkpoint_at:
          description: Timestamp of the latest checkpoint.
          example: 2026-04-17T00:00:00Z
          format: date-time
          type:
          - string
          - 'null'
        checkpoint_seq:
          description: Canonical event sequence for the latest checkpoint.
          example: 128
          minimum: 0
          type:
          - integer
          - 'null'
        checkpoint_summary:
          description: Latest durable progress summary reported by the worker.
          example: Checked all queued tasks.
          type:
          - string
          - 'null'
        created_at:
          description: Task creation timestamp.
          example: 2026-04-17T00:00:00Z
          format: date-time
          readOnly: true
          type: string
        instructions:
          description: Full worker instructions captured at intake.
          example: Inspect queued and running tasks and report any items that are stuck.
          type: string
        latest_run_id:
          description: Most recent run created for this task.
          example: si-run-0123456789abcdef00000001
          pattern: ^si-run-.+
          readOnly: true
          type:
          - string
          - 'null'
        max_retries:
          description: Maximum retry attempts configured for this task.
          example: 0
          minimum: 0
          type:
          - integer
          - 'null'
        parent_task_id:
          description: Parent task id when this task was produced by another task.
          example: si-task-0123456789abcdef00000000
          pattern: ^si-task-.+
          type:
          - string
          - 'null'
        producer_dedup_key:
          description: Producer deduplication key used to avoid duplicate task intake.
          example: nightly-audit:2026-04-17
          type:
          - string
          - 'null'
        producer_rule_name:
          description: Hook or producer rule that created this task.
          example: nightly-audit
          type:
          - string
          - 'null'
        profile:
          description: Preferred SI worker profile for this task.
          example: darmstada
          pattern: ^[a-z][a-z0-9-]*$
          type:
          - string
          - 'null'
        session_id:
          description: Session currently associated with this task, if any.
          example: si-session-0123456789abcdef00000001
          pattern: ^si-session-.+
          readOnly: true
          type:
          - string
          - 'null'
        source:
          description: Source category that created the task.
          enum:
          - cli
          - websocket
          - cron
          - hook
          - system
          example: websocket
          readOnly: true
          type: string
        status:
          description: Current task lifecycle status.
          enum:
          - queued
          - running
          - blocked
          - done
          - failed
          - cancelled
          example: queued
          readOnly: true
          type: string
        task_id:
          description: Canonical SI task id.
          example: si-task-0123456789abcdef00000001
          pattern: ^si-task-.+
          readOnly: true
          type: string
        timeout_seconds:
          description: Execution timeout configured for this task.
          example: 900
          minimum: 0
          type:
          - integer
          - 'null'
        title:
          description: Short operator-facing summary of the task.
          example: Audit Nucleus tasks
          type: string
        updated_at:
          description: Last task update timestamp.
          example: 2026-04-17T00:00:00Z
          format: date-time
          readOnly: true
          type: string
      required:
      - task_id
      - source
      - title
      - instructions
      - status
      - created_at
      - updated_at
      type: object
    WorkerInspectView:
      additionalProperties: false
      description: Worker record plus optional live runtime observation.
      properties:
        runtime:
          anyOf:
          - $ref: '#/components/schemas/WorkerRuntimeView'
          - type: 'null'
          description: Live runtime process details when the worker process can be observed.
        worker:
          allOf:
          - $ref: '#/components/schemas/WorkerRecord'
          description: Durable worker projection.
      required:
      - worker
      type: object
    WorkerRecord:
      additionalProperties: false
      description: Durable worker projection tracked by Nucleus.
      properties:
        capability_version:
          description: Worker capability or package version when reported.
          example: 0.59.13
          type:
          - string
          - 'null'
        codex_home:
          description: Codex home directory used by this worker.
          example: /home/si/.codex
          type: string
        effective_account_state:
          description: Observed account/authentication state for this worker.
          example: authenticated
          readOnly: true
          type:
          - string
          - 'null'
        extra_env:
          additionalProperties:
            type: string
          description: Non-secret extra environment values configured for the worker.
          example: {}
          properties: {}
          type: object
        home_dir:
          description: Home directory used by the worker process.
          example: /home/si
          type:
          - string
          - 'null'
        last_heartbeat_at:
          description: Most recent heartbeat timestamp.
          example: 2026-04-17T00:00:00Z
          format: date-time
          readOnly: true
          type:
          - string
          - 'null'
        profile:
          description: SI profile this worker runs as.
          example: darmstada
          pattern: ^[a-z][a-z0-9-]*$
          type: string
        status:
          description: Worker lifecycle status.
          enum:
          - starting
          - ready
          - degraded
          - failed
          - stopped
          example: ready
          readOnly: true
          type: string
        workdir:
          description: Default workspace directory for worker execution.
          example: /home/si/Development/si
          type:
          - string
          - 'null'
        worker_id:
          description: Canonical SI worker id.
          example: si-worker-0123456789abcdef00000001
          pattern: ^si-worker-.+
          readOnly: true
          type: string
      required:
      - worker_id
      - profile
      - codex_home
      - status
      type: object
    WorkerRuntimeView:
      additionalProperties: false
      description: Observed runtime process attached to a worker.
      properties:
        checked_at:
          description: Timestamp when runtime process state was checked.
          example: 2026-04-17T00:00:10Z
          format: date-time
          readOnly: true
          type: string
        pid:
          description: Operating system process id.
          example: 12345
          minimum: 0
          readOnly: true
          type: integer
        runtime_name:
          description: Runtime adapter name.
          example: codex
          readOnly: true
          type: string
        started_at:
          description: Runtime process start timestamp.
          example: 2026-04-17T00:00:00Z
          format: date-time
          readOnly: true
          type: string
        worker_id:
          description: Canonical SI worker id for the runtime process.
          example: si-worker-0123456789abcdef00000001
          pattern: ^si-worker-.+
          readOnly: true
          type: string
      required:
      - worker_id
      - runtime_name
      - pid
      - started_at
      - checked_at
      type: object
  securitySchemes:
    bearerAuth:
      bearerFormat: opaque token
      description: Opaque bearer token provided by SI Fort for Nucleus REST access.
      scheme: bearer
      type: http
info:
  description: Bounded external integration API over the canonical SI Nucleus task, worker, session, and run model.
  title: SI Nucleus REST API
  version: 0.59.13
openapi: 3.1.0
paths:
  /openapi.json:
    get:
      description: Read the public OpenAPI-compatible REST description for bounded external integrations.
      operationId: getOpenApiDocument
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OpenApiDocumentView'
          description: Public OpenAPI document.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Request failed.
      security: []
      summary: Fetch the OpenAPI document
      x-si-purpose: Use this unauthenticated endpoint to bootstrap GPT Actions or other external tool clients against the bounded REST surface.
  /runs/{run_id}:
    get:
      description: Read one durable run projection by run id.
      operationId: inspectRun
      parameters:
      - description: Canonical SI run id returned by task or session inspection.
        example: si-run-0123456789abcdef00000001
        in: path
        name: run_id
        required: true
        schema:
          example: si-run-0123456789abcdef00000001
          pattern: ^si-run-.+
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                app_server_turn_id: null
                ended_at: null
                parent_run_id: null
                run_id: si-run-0123456789abcdef00000001
                session_id: si-session-0123456789abcdef00000001
                started_at: 2026-04-17T00:00:05Z
                status: running
                task_id: si-task-0123456789abcdef00000001
              schema:
                $ref: '#/components/schemas/RunRecord'
          description: Run record.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Run not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Request failed.
      security:
      - bearerAuth: []
      summary: Inspect one run
      x-si-purpose: Use this to inspect bounded run state from external tools without subscribing to websocket events.
  /sessions/{session_id}:
    get:
      description: Read one durable session projection by session id.
      operationId: inspectSession
      parameters:
      - description: Canonical SI session id returned by session or run inspection.
        example: si-session-0123456789abcdef00000001
        in: path
        name: session_id
        required: true
        schema:
          example: si-session-0123456789abcdef00000001
          pattern: ^si-session-.+
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                app_server_thread_id: thread_0123456789abcdef
                created_at: 2026-04-17T00:00:00Z
                lifecycle_state: ready
                profile: darmstada
                session_id: si-session-0123456789abcdef00000001
                summary_state: idle
                updated_at: 2026-04-17T00:00:00Z
                workdir: /home/si/Development/si
                worker_id: si-worker-0123456789abcdef00000001
              schema:
                $ref: '#/components/schemas/SessionRecord'
          description: Session record.
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Session not found.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Request failed.
      security:
      - bearerAuth: []
      summary: Inspect one session
      x-si-purpose: Use this to inspect worker/session binding and reusable thread identity from external tooling.
  /status:
    get:
      description: Read the current Nucleus status projection, including bind address, state directory, and durable object counts.
      operationId: getNucleusStatus
      responses:
        '200':
          content:
            application/json:
              example:
                bind_addr: 0.0.0.0:4747
                next_event_seq: 128
                run_count: 8
                session_count: 2
                state_dir: /home/si/.local/state/si/nucleus
                task_count: 12
                version: 0.59.13
                worker_count: 2
                ws_url: ws://0.0.0.0:4747/ws
              schema:
                $ref: '#/components/schemas/NucleusStatusView'
          description: Current nucleus status.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Request failed.
      security:
      - bearerAuth: []
      summary: Inspect Nucleus status
      x-si-purpose: Use this for bounded external health and topology inspection without opening the websocket control plane.
  /tasks:
    get:
      description: List durable tasks from the same source of truth used by the websocket gateway and CLI.
      operationId: listTasks
      responses:
        '200':
          content:
            application/json:
              example:
              - blocked_reason: null
                checkpoint_at: null
                checkpoint_seq: null
                checkpoint_summary: null
                created_at: 2026-04-17T00:00:00Z
                instructions: Inspect queued and running tasks and report any items that are stuck.
                latest_run_id: null
                max_retries: 0
                parent_task_id: null
                producer_dedup_key: null
                producer_rule_name: null
                profile: darmstada
                session_id: null
                source: websocket
                status: queued
                task_id: si-task-0123456789abcdef00000001
                timeout_seconds: 900
                title: Audit Nucleus tasks
                updated_at: 2026-04-17T00:00:00Z
              schema:
                items:
                  $ref: '#/components/schemas/TaskRecord'
                type: array
          description: All durable tasks.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Request failed.
      security:
      - bearerAuth: []
      summary: List tasks
      x-si-purpose: Use this for bounded task inspection and polling from external tools such as GPT Actions.
    post:
      description: Create a durable task through Nucleus so it can be routed, executed, and observed through the canonical control plane.
      operationId: createTask
      requestBody:
        content:
          application/json:
            example:
              instructions: Inspect queued and running tasks and report any items that are stuck.
              max_retries: 0
              profile: darmstada
              session_id: null
              source: websocket
              timeout_seconds: 900
              title: Audit Nucleus tasks
            schema:
              $ref: '#/components/schemas/TaskCreateParams'
        description: Task intake request. Provide a concise title and complete operator instructions; optionally provide a preferred profile, but Nucleus can assign or fall back to another available profile when no session is pinned.
        required: true
      responses:
        '201':
          content:
            application/json:
              example:
                blocked_reason: null
                checkpoint_at: null
                checkpoint_seq: null
                checkpoint_summary: null
                created_at: 2026-04-17T00:00:00Z
                instructions: Inspect queued and running tasks and report any items that are stuck.
                latest_run_id: null
                max_retries: 0
                parent_task_id: null
                producer_dedup_key: null
                producer_rule_name: null
                profile: darmstada
                session_id: null
                source: websocket
                status: queued
                task_id: si-task-0123456789abcdef00000001
                timeout_seconds: 900
                title: Audit Nucleus tasks
                updated_at: 2026-04-17T00:00:00Z
              schema:
                $ref: '#/components/schemas/TaskRecord'
          description: Created task.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Invalid request.
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Bearer token missing or invalid for an authenticated request.
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RestErrorEnvelope'
          description: Request failed.
      security:
      - bearerAuth: []
      summary: Create a task
      x-openai-isConsequential: true
      x-si-purpose: Use this to create bounded external work without bypassing Nucleus task intake rules.
  /tasks/{task_id}:
    get:
      description: Read one durable task projection by task id.
      operationId: inspectTask
      parameters:
      - description: Canonical SI task id returned by task creation or task listing.
        example: si-task-0123456789abcdef00000001
        in: path
        name: task_id
        required: true
        schema:
          example: si-task-0123456789abcdef00000001
          pattern: ^si-task-.+
          type: string
      responses:
        '200':
          content:
            application/json:
              example:
                blocked_reason: null
