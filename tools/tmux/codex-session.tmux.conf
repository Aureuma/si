set -g mouse on
set -g history-limit 200000
set -g allow-rename off
setw -g automatic-rename off
setw -g mode-keys vi

# Make wheel scrolling immediately move through pane history instead of
# requiring a separate copy-mode step first.
bind-key -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" \
  "send-keys -M" \
  "if-shell -F -t = '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e; send-keys -M'"
bind-key -n WheelDownPane if-shell -F -t = "#{pane_in_mode}" "send-keys -M"
